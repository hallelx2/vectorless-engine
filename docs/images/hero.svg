<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="vectorless-engine: reason over document structure, not embeddings">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- decorative glow -->
  <circle cx="210" cy="210" r="140" fill="#6366f1" opacity="0.18" filter="url(#soft)"/>
  <circle cx="1000" cy="210" r="140" fill="#14b8a6" opacity="0.18" filter="url(#soft)"/>

  <!-- Document icon (left) -->
  <g transform="translate(120 120)">
    <rect width="170" height="200" rx="10" fill="url(#docGrad)" stroke="#475569"/>
    <path d="M130 0 L170 40 L130 40 Z" fill="#94a3b8" stroke="#475569"/>
    <g stroke="#64748b" stroke-width="3" stroke-linecap="round">
      <line x1="20" y1="70" x2="150" y2="70"/>
      <line x1="20" y1="90" x2="140" y2="90"/>
      <line x1="20" y1="110" x2="100" y2="110"/>
      <line x1="20" y1="140" x2="150" y2="140"/>
      <line x1="20" y1="160" x2="110" y2="160"/>
    </g>
    <text x="85" y="232" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system" font-size="18" text-anchor="middle" font-weight="600">document</text>
  </g>

  <!-- Arrow to tree -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M310 220 L410 220" />
    <path d="M395 210 L410 220 L395 230"/>
  </g>

  <!-- Tree (center) -->
  <g transform="translate(440 70)">
    <!-- root -->
    <rect x="130" y="0" width="80" height="36" rx="6" fill="#6366f1" opacity="0.9"/>
    <text x="170" y="23" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="14" text-anchor="middle" font-weight="700">Root</text>

    <!-- level 2 -->
    <rect x="10" y="90" width="90" height="32" rx="5" fill="#4f46e5" opacity="0.8"/>
    <text x="55" y="111" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="12" text-anchor="middle">Part I</text>

    <rect x="125" y="90" width="90" height="32" rx="5" fill="#4f46e5" opacity="0.8"/>
    <text x="170" y="111" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="12" text-anchor="middle">Part II</text>

    <rect x="240" y="90" width="90" height="32" rx="5" fill="#4f46e5" opacity="0.8"/>
    <text x="285" y="111" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="12" text-anchor="middle">Part III</text>

    <!-- level 3 -->
    <rect x="0" y="170" width="50" height="26" rx="4" fill="#14b8a6" opacity="0.8"/>
    <rect x="60" y="170" width="50" height="26" rx="4" fill="#14b8a6" opacity="0.8"/>
    <rect x="125" y="170" width="50" height="26" rx="4" fill="#14b8a6" opacity="0.8"/>
    <rect x="180" y="170" width="50" height="26" rx="4" fill="#f59e0b" opacity="0.95"/>
    <rect x="240" y="170" width="50" height="26" rx="4" fill="#14b8a6" opacity="0.8"/>
    <rect x="295" y="170" width="50" height="26" rx="4" fill="#f59e0b" opacity="0.95"/>

    <!-- connectors -->
    <g stroke="#64748b" stroke-width="1.5" fill="none">
      <path d="M170 36 L55 90"/>
      <path d="M170 36 L170 90"/>
      <path d="M170 36 L285 90"/>
      <path d="M55 122 L25 170"/>
      <path d="M55 122 L85 170"/>
      <path d="M170 122 L150 170"/>
      <path d="M170 122 L205 170"/>
      <path d="M285 122 L265 170"/>
      <path d="M285 122 L320 170"/>
    </g>
    <text x="170" y="220" fill="#e2e8f0" font-family="ui-sans-serif, system-ui" font-size="18" text-anchor="middle" font-weight="600">structured tree</text>
    <text x="170" y="244" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="13" text-anchor="middle">titles · summaries · metadata</text>
  </g>

  <!-- Arrow to LLM -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M800 220 L900 220" />
    <path d="M885 210 L900 220 L885 230"/>
  </g>

  <!-- LLM / result -->
  <g transform="translate(920 140)">
    <rect width="170" height="140" rx="14" fill="#0f766e" opacity="0.2" stroke="#14b8a6" stroke-width="2"/>
    <text x="85" y="35" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="16" text-anchor="middle" font-weight="700">LLM reasons</text>
    <text x="85" y="58" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="12" text-anchor="middle">picks relevant</text>
    <text x="85" y="74" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="12" text-anchor="middle">section IDs</text>
    <rect x="18" y="95" width="40" height="22" rx="4" fill="#f59e0b"/>
    <rect x="66" y="95" width="40" height="22" rx="4" fill="#f59e0b"/>
    <rect x="114" y="95" width="40" height="22" rx="4" fill="#f59e0b"/>
  </g>

  <!-- Title -->
  <text x="600" y="50" fill="#ffffff" font-family="ui-sans-serif, system-ui" font-size="36" text-anchor="middle" font-weight="800" letter-spacing="-1">vectorless-engine</text>
  <text x="600" y="78" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="15" text-anchor="middle">reason over document structure — not embeddings</text>

  <!-- Bottom label -->
  <text x="600" y="385" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="12" text-anchor="middle">no top-K · no vector DB · full sections, not fragments</text>
</svg>
