<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sig2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1456F0"/><stop offset="1" stop-color="#EA5EC1"/>
    </linearGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#0A0A0A" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="1240" height="430" fill="#FCFCFD"/>

  <!-- LEFT: traditional vector RAG -->
  <g filter="url(#sh2)"><rect x="40" y="40" width="560" height="350" rx="18" fill="#fff" stroke="#E5E7EB"/></g>
  <text x="72" y="92" font-size="13" letter-spacing="2" font-family="monospace" fill="#71717A" font-weight="700">TRADITIONAL VECTOR RAG</text>
  <text x="72" y="124" font-size="22" fill="#0A0A0A" font-weight="600">Cut it up, hope for the best</text>

  <g font-size="15" fill="#3F3F46">
    <circle cx="84" cy="168" r="4" fill="#71717A"/><text x="104" y="173">Chunk the document — structure is lost</text>
    <circle cx="84" cy="206" r="4" fill="#71717A"/><text x="104" y="211">Embed every chunk into a vector DB</text>
    <circle cx="84" cy="244" r="4" fill="#71717A"/><text x="104" y="249">Top-K nearest neighbours — a guess</text>
    <circle cx="84" cy="282" r="4" fill="#71717A"/><text x="104" y="287">Stitch fragments back together</text>
    <circle cx="84" cy="320" r="4" fill="#71717A"/><text x="104" y="325">Re-embed everything when models change</text>
  </g>
  <text x="72" y="366" font-size="14" fill="#DC2626">Lossy · approximate · a second database to run</text>

  <!-- RIGHT: vectorless -->
  <g filter="url(#sh2)"><rect x="640" y="40" width="560" height="350" rx="18" fill="#fff" stroke="url(#sig2)" stroke-width="2"/></g>
  <text x="672" y="92" font-size="13" letter-spacing="2" font-family="monospace" font-weight="700" fill="url(#sig2)">VECTORLESS</text>
  <text x="672" y="124" font-size="22" fill="#0A0A0A" font-weight="600">Keep the structure, reason over it</text>

  <g font-size="15" fill="#3F3F46">
    <path d="M680 164 l5 6 l9 -12" stroke="#1456F0" stroke-width="2.4" fill="none"/><text x="704" y="173">Parse into a tree of real sections</text>
    <path d="M680 202 l5 6 l9 -12" stroke="#1456F0" stroke-width="2.4" fill="none"/><text x="704" y="211">An LLM navigates by title + page</text>
    <path d="M680 240 l5 6 l9 -12" stroke="#1456F0" stroke-width="2.4" fill="none"/><text x="704" y="249">Returns whole sections, in context</text>
    <path d="M680 278 l5 6 l9 -12" stroke="#1456F0" stroke-width="2.4" fill="none"/><text x="704" y="287">Citations for free — page + quote</text>
    <path d="M680 316 l5 6 l9 -12" stroke="#1456F0" stroke-width="2.4" fill="none"/><text x="704" y="325">Swap models freely — nothing to recompute</text>
  </g>
  <text x="672" y="366" font-size="14" font-weight="600" fill="url(#sig2)">Structure-preserving · exact · just Postgres + storage</text>
</svg>
