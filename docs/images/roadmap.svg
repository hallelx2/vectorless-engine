<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 440" role="img" aria-label="vectorless-engine roadmap">
  <rect width="1100" height="440" fill="#f8fafc"/>

  <text x="550" y="40" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#0f172a">Roadmap</text>
  <text x="550" y="62" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#475569">open source engine · shipping incrementally</text>

  <!-- timeline -->
  <line x1="80" y1="220" x2="1020" y2="220" stroke="#cbd5e1" stroke-width="3"/>

  <!-- milestones -->
  <g font-family="ui-sans-serif, system-ui">
    <!-- Phase 0: done -->
    <g transform="translate(80 220)">
      <circle r="14" fill="#16a34a"/>
      <text y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800">✓</text>
      <text y="-28" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Phase 0 — scaffold</text>
      <text y="40" text-anchor="middle" font-size="11" fill="#475569">Go module</text>
      <text y="56" text-anchor="middle" font-size="11" fill="#475569">interfaces</text>
      <text y="72" text-anchor="middle" font-size="11" fill="#475569">HTTP /v1 routes</text>
      <text y="88" text-anchor="middle" font-size="11" fill="#475569">local + qstash + anthropic</text>
      <text y="110" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="700">SHIPPED</text>
    </g>

    <!-- Phase 1: in progress -->
    <g transform="translate(310 220)">
      <circle r="14" fill="#f59e0b"/>
      <text y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800">●</text>
      <text y="-28" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Phase 1 — ingest</text>
      <text y="40" text-anchor="middle" font-size="11" fill="#475569">PDF / MD / HTML parse</text>
      <text y="56" text-anchor="middle" font-size="11" fill="#475569">tree builder</text>
      <text y="72" text-anchor="middle" font-size="11" fill="#475569">summarizer workflow</text>
      <text y="88" text-anchor="middle" font-size="11" fill="#475569">Postgres schema + migrations</text>
      <text y="110" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="700">IN PROGRESS</text>
    </g>

    <!-- Phase 2 -->
    <g transform="translate(540 220)">
      <circle r="14" fill="#6366f1"/>
      <text y="-28" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Phase 2 — retrieval</text>
      <text y="40" text-anchor="middle" font-size="11" fill="#475569">single-pass live</text>
      <text y="56" text-anchor="middle" font-size="11" fill="#475569">chunked-tree live</text>
      <text y="72" text-anchor="middle" font-size="11" fill="#475569">OpenAI + Gemini clients</text>
      <text y="88" text-anchor="middle" font-size="11" fill="#475569">benchmarks vs RAG</text>
      <text y="110" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="700">NEXT</text>
    </g>

    <!-- Phase 3 -->
    <g transform="translate(770 220)">
      <circle r="14" fill="#14b8a6"/>
      <text y="-28" text-anchor="middle" font-size="13" font-weight="700" fill="#115e59">Phase 3 — ecosystem</text>
      <text y="40" text-anchor="middle" font-size="11" fill="#475569">River + Asynq live</text>
      <text y="56" text-anchor="middle" font-size="11" fill="#475569">S3-compatible live</text>
      <text y="72" text-anchor="middle" font-size="11" fill="#475569">TS / Python / Go SDKs</text>
      <text y="88" text-anchor="middle" font-size="11" fill="#475569">Docker + Helm</text>
      <text y="110" text-anchor="middle" font-size="10" fill="#14b8a6" font-weight="700">SOON</text>
    </g>

    <!-- Phase 4 -->
    <g transform="translate(1000 220)">
      <circle r="14" fill="#a855f7"/>
      <text y="-28" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Phase 4 — scale</text>
      <text y="40" text-anchor="middle" font-size="11" fill="#475569">multi-doc queries</text>
      <text y="56" text-anchor="middle" font-size="11" fill="#475569">streaming answers</text>
      <text y="72" text-anchor="middle" font-size="11" fill="#475569">caching layer</text>
      <text y="88" text-anchor="middle" font-size="11" fill="#475569">tree compaction</text>
      <text y="110" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="700">LATER</text>
    </g>
  </g>

  <text x="550" y="410" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-style="italic" fill="#64748b">contributions welcome at every phase — see CONTRIBUTING.md</text>
</svg>
