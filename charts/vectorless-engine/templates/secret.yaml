{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vectorless-engine.secretName" . }}
  labels:
    {{- include "vectorless-engine.labels" . | nindent 4 }}
type: Opaque
data:
  VLE_DATABASE_URL: {{ .Values.env.VLE_DATABASE_URL | b64enc | quote }}
  VLE_ANTHROPIC_API_KEY: {{ .Values.env.VLE_ANTHROPIC_API_KEY | b64enc | quote }}
{{- end }}
